services:
  mongo:
    image: mongo:7
    container_name: crud-mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db

  api:
    build:
      context: ./backend
    container_name: crud-api
    ports:
      - "4000:4000"
    environment:
      MONGO_URI: mongodb://mongo:27017/crud_demo
      PORT: "4000"
      SEED_ON_START: "true"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: http://localhost:4000/api
    container_name: crud-frontend
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  mongo-data:
